<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация завершена!</title>
  <meta name="description" content="Мы с нетерпением ждем возможности приветствовать вас на нашем празднике!" />
  <link rel="shortcut icon" type="image/x-icon" href="img/favicon.ico" />
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Alumni+Sans+Pinstripe&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css" />
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Alumni Sans Pinstripe', sans-serif;
      background: linear-gradient(135deg, #fdf6f0, #fff8f1);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #333;
    }

    .thanks-container {
      max-width: 600px;
      padding: 40px 20px;
      margin-inline: 10px;
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      animation: fadeIn 1.2s ease-out;
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 42px;
      line-height: 1.3;
      margin-bottom: 24px;
      color: #5b3a29;
    }

    p {
      font-size: 22px;
      line-height: 1.6;
      margin-bottom: 36px;
      color: #3e3026;
      font-weight: 600;
    }

    a {
      display: inline-block;
      font-size: 20px;
      padding: 12px 30px;
      border-radius: 30px;
      background-color: #766254;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    a:hover {
      background-color: #dcb49a;
      transform: translateY(-2px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 32px;
      }

      a {
        font-size: 18px;
        padding: 10px 25px;
      }
    }
  </style>
</head>

<body>
  <div class="thanks-container">
    <h1>Регистрация завершена</h1>
    <p>
      Мы с нетерпением ждем,<br />
      чтобы приветствовать вас на нашем празднике.
    </p>
    <a href="https://prima-invitations.vercel.app/viacheslav-polina/">Вернуться к приглашению</a>
  </div>
</body>

</html>
